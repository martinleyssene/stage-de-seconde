      zoneDeplacement.style.top = Math.round(rect.bottom + 4) + 'px';
    }
    window.addEventListener('resize', ajusterHauteurZoneDeplacement);
    window.addEventListener('resize', dessinerLiens);
    setTimeout(ajusterHauteurZoneDeplacement, 100);

    // ----- LA RECETTE "ajouterNote" -----
    // Elle se déclenche quand on clique sur le bouton.
    function ajouterNote() {

      // 1) On va CHERCHER ce que l'utilisateur a tapé.
      //    On retrouve les champs grâce à leur étiquette (id),
      //    et ".value" veut dire "le texte qui est dedans".
      let titre   = document.getElementById("champTitre").value;
      let contenu = document.getElementById("champContenu").value;

      // 2) Si le titre est vide, on arrête là (on ne crée pas de note vide).
      if (titre === "") {
        afficherToast("Donne au moins un titre à ton idée !", 'attention');
        return;   // "return" = on sort de la recette tout de suite
      }

      // 3) On range la nouvelle note dans notre boîte "mesNotes".
      //    Une note est un petit paquet avec un titre et un contenu.
      mesNotes.push({ titre: titre, contenu: contenu });
      // La nouvelle note se place à sa position de cascade (la même que
      // celle que lui donnerait le bouton "Réinitialiser").
      positionsNotes[mesNotes.length - 1] = positionCascade(mesNotes.length - 1);

      // 4) On sauvegarde immédiatement en localStorage
      sauvegarderNotesEnStockage();

      // 5) On vide les champs pour pouvoir écrire la note suivante.
      document.getElementById("champTitre").value   = "";
      document.getElementById("champContenu").value = "";

      // 6) On redessine la liste à l'écran (recette juste en dessous).
      //    (La sauvegarde du fichier est gérée automatiquement par
      //     sauvegarderNotesEnStockage, appelée à l'étape 4.)
      afficherLesNotes();
    }


    // ----- LA RECETTE "afficherLesNotes" -----
    // Elle redessine TOUTE la liste de notes à l'écran.
    function afficherLesNotes() {

      // On retrouve la zone d'affichage (la div vide tout en haut).
      let zone = document.getElementById("listeDesNotes");

      // On la vide complètement avant de tout redessiner proprement.
      zone.innerHTML = "";

      // Garde-fou : si l'index en édition ne correspond plus à une note
      // existante, on l'annule (évite un formulaire fantôme / un compteur faux).
      if (indexEnEdition !== null && (indexEnEdition < 0 || indexEnEdition >= mesNotes.length)) {
        indexEnEdition = null;
      }

      // Mettre à jour le compteur de notes (toujours synchronisé sur le nombre réel)
      let compteur = document.getElementById("compteurNotes");
      if (compteur) compteur.innerText = "Notes : " + mesNotes.length;

      let positionPile = obtenirPositionPile();

      // On parcourt les notes UNE PAR UNE.
      // (cette boucle veut dire : "pour chaque note de la liste, fais ceci")
      for (let i = 0; i < mesNotes.length; i++) {
        let note = mesNotes[i];
        let titreNote = escapeHtml(note.titre);
        let contenuNoteHTML = escapeHtml(note.contenu).replace(/\n/g, "<br>");
        let contenuNoteText = escapeHtml(note.contenu);

        // Position de la note : LA MÊME en mode normal ET en mode édition, pour
        // que la note ne "saute" pas à l'origine (0,0) — et donc ne disparaisse
        // pas hors écran — quand on clique sur ✏️ pour la modifier.
        // Couleur de fond et de texte éventuelles (vides = valeurs par défaut).
        // couleurValidee() écarte toute valeur dangereuse (sécurité : ces couleurs
        // peuvent provenir d'un fichier .json importé).
        let cFond  = couleurValidee(note.couleur);
        let cTexte = couleurValidee(note.couleurTexte);
        let fond = (cFond ? ' background: ' + cFond + ';' : '') + (cTexte ? ' color: ' + cTexte + ';' : '');
        let posStyle = '';
        if (positionsNotes[i]) {
          let zStyle = positionsNotes[i].z ? ' z-index: ' + positionsNotes[i].z + ';' : '';
          posStyle = 'style="left: ' + positionsNotes[i].x + 'px; top: ' + positionsNotes[i].y + 'px;' + zStyle + fond + '"';
        } else {
          posStyle = 'style="left: ' + positionPile.x + 'px; top: ' + positionPile.y + 'px;' + fond + '"';
        }

        if (i === indexEnEdition) {
          zone.innerHTML +=
            '<div class="note" data-index="' + i + '" ' + posStyle + '>' +
              '<div class="note-content">' +
                '<input id="titre-edition-' + i + '" type="text" value="' + titreNote + '">' +
                '<textarea id="contenu-edition-' + i + '" rows="4">' + contenuNoteText + '</textarea>' +
                '<div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">' +
                  '<button onclick="enregistrerModification(' + i + ')">Enregistrer</button>' +
                  '<button onclick="annulerModification()" style="background: #888;">Annuler</button>' +
                '</div>' +
              '</div>' +
            '</div>';
        } else {
          let classeReduit = notesReduites[i] ? ' reduit' : '';
          // Les images déjà importées pour cette note (s'il y en a)
          let imagesHTML = '';
          if (note.images && note.images.length) {
            for (let k = 0; k < note.images.length; k++) {
              // SÉCURITÉ : la source d'image peut venir d'un fichier .json importé
              // (non fiable). On n'accepte que les images intégrées (data:image/…)
              // ou les liens http(s), et on échappe la valeur pour empêcher toute
              // sortie de l'attribut src (injection d'un onerror, etc.).
              let src = note.images[k];
              if (typeof src === 'string' && /^(data:image\/|https?:\/\/)/.test(src)) {
                imagesHTML += '<img class="note-image" src="' + escapeHtml(src) + '" alt="image de la note">';
              }
            }
          }
          // Petite icône "paysage" (cadre + soleil + montagnes) pour le bouton
          let iconePaysage =
            '<svg width="18" height="16" viewBox="0 0 24 20" xmlns="http://www.w3.org/2000/svg">' +
              '<rect x="1.5" y="1.5" width="21" height="17" rx="2" fill="#eef3f7" stroke="#5a6b7b" stroke-width="1.5"/>' +
              '<circle cx="7" cy="6.5" r="2.2" fill="#f4b740"/>' +
              '<path d="M2.5 18 L9 10.5 L13 14.5 L16.5 9 L21.5 18 Z" fill="#7bb36a"/>' +
            '</svg>';
          zone.innerHTML +=
            '<div class="note' + classeReduit + '" data-index="' + i + '" ' + posStyle + ' onclick="basculerReduction(' + i + ', event)">' +
              '<div class="note-content">' +
                '<h3>' + titreNote + '</h3>' +
                '<p>'  + contenuNoteHTML + '</p>' +
                imagesHTML +
              '</div>' +
              '<div class="note-actions">' +
                '<button class="button-action button-edit" onclick="demarrerModification(' + i + ', event)">✏️</button>' +
                '<button class="button-action button-delete" onclick="supprimerNote(' + i + ', event)">❌</button>' +
              '</div>' +
              '<button class="button-action button-couleur" onclick="ouvrirPalette(' + i + ', event)" title="Couleur de la note">🎨</button>' +
              '<button class="button-image" onclick="importerImages(' + i + ', event)" title="Ajouter une ou des images">' + iconePaysage + '</button>' +
            '</div>';
        }
      }
      // Attacher le drag par pointer et souris aux notes rendues
      zone.querySelectorAll('.note').forEach(function(noteElement) {
        noteElement.removeEventListener('mousedown', demarrerDeplacement);
        noteElement.removeEventListener('touchstart', demarrerDeplacement);
        noteElement.addEventListener('mousedown', demarrerDeplacement);
        noteElement.addEventListener('touchstart', demarrerDeplacement, { passive: false });
      });
      // Dessiner les traits qui relient les notes
      dessinerLiens();
      // Surbrillance (sélection) et recherche : purement cosmétiques. On les
      // protège pour qu'un éventuel souci ici n'empêche JAMAIS l'affichage des
      // notes ni la suite du démarrage (zoom/position de la vue).
      try {
        majSurbrillanceSelection();
        appliquerRecherche();
      } catch (e) {
        console.error('Surbrillance/recherche :', e);
      }
    }

    // ----- RECHERCHE DANS LES NOTES -----
    // Surligne les notes dont le titre/contenu contient le texte cherché et
    // atténue les autres. Recherche vide = tout redevient normal.
    // (La variable rechercheActuelle est déclarée tout en haut, car
    //  appliquerRecherche est appelée dès le démarrage par afficherLesNotes.)
    function surRecherche(valeur) {
      rechercheActuelle = valeur || '';
      appliquerRecherche();
    }
    function appliquerRecherche() {
      let zone = document.getElementById('listeDesNotes');
      if (!zone) return;
      zone.querySelectorAll('.note').forEach(function(el) {
        el.classList.remove('note-resultat', 'note-attenue');
      });
      let info = document.getElementById('rechercheInfo');
      let q = rechercheActuelle.trim().toLowerCase();
      if (q === '') { if (info) info.textContent = ''; return; }
      let nb = 0;
      for (let i = 0; i < mesNotes.length; i++) {
        let el = zone.querySelector('.note[data-index="' + i + '"]');
        if (!el) continue;
        let texte = ((mesNotes[i].titre || '') + ' ' + (mesNotes[i].contenu || '')).toLowerCase();
        if (texte.indexOf(q) !== -1) { el.classList.add('note-resultat'); nb++; }
        else { el.classList.add('note-attenue'); }
      }
      if (info) info.textContent = nb + ' résultat' + (nb > 1 ? 's' : '');
    }

    // ----- IMPORTER UNE OU PLUSIEURS IMAGES DANS UNE NOTE -----
    function importerImages(index, event) {
      event.stopPropagation();   // ne pas réduire la note ni la déplacer
      // On crée un champ de fichiers caché qui accepte plusieurs images
      let input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', function() {
        // On ne garde que les vrais fichiers image
        let images = Array.prototype.slice.call(input.files).filter(function(f) {
          return f.type && f.type.indexOf('image/') === 0;
        });
        if (images.length === 0) return;
        if (!mesNotes[index].images) mesNotes[index].images = [];
        let restants = images.length;
        images.forEach(function(fichier) {
          let lecteur = new FileReader();
          lecteur.onload = function(e) {
            // On range l'image (sous forme de texte "data URL") dans la note
            mesNotes[index].images.push(e.target.result);
            restants--;
            if (restants === 0) terminerImport();
          };
          lecteur.onerror = function() {
            restants--;
            if (restants === 0) terminerImport();
          };
          lecteur.readAsDataURL(fichier);
        });
      });
      input.click();

      function terminerImport() {
        try {
          sauvegarderNotesEnStockage();
        } catch (err) {
          afficherToast("⚠️ Les images sont trop lourdes pour être conservées dans le navigateur. Elles s'affichent, mais risquent de disparaître au rechargement. Pense à télécharger tes notes.", 'attention');
        }
        afficherLesNotes();
      }
    }

    function basculerReduction(index, event) {
      // Ne pas basculer si on a cliqué sur un bouton, input, textarea
      if (event.target.classList.contains('button-action') || 
          event.target.closest('.button-action') ||
          event.target.closest('input') ||
          event.target.closest('textarea') ||
          event.target.closest('button')) {
        return;
      }
      // En mode "Relier", un clic sert à choisir les notes à relier
      if (modeRelier) {
        selectionnerPourLien(index);
        return;
      }
      // En mode "Supprimer liens", cliquer une note ne fait rien de spécial :
      // on laisse le clic remonter pour annuler le mode (voir clic "ailleurs").
      if (modeSupprimerLiens) {
        return;
      }
      // En mode "Sélection", un clic ajoute/retire la note de la sélection
      // (sans la réduire/agrandir).
      if (modeSelection) {
        let pos = notesSelectionnees.indexOf(index);
        if (pos === -1) notesSelectionnees.push(index);
        else notesSelectionnees.splice(pos, 1);
        majSurbrillanceSelection();
        return;
      }
      notesReduites[index] = !notesReduites[index];
      sauvegarderNotesEnStockage();  // pour garder l'état réduit après rechargement
      afficherLesNotes();
    }

    function demarrerModification(index, event) {
      event.stopPropagation();  // Empêcher le click de remonter à la note
      indexEnEdition = index;
      afficherLesNotes();
    }

    function annulerModification() {
      indexEnEdition = null;
      afficherLesNotes();
    }

    function enregistrerModification(index) {
      let titre = document.getElementById("titre-edition-" + index).value;
      let contenu = document.getElementById("contenu-edition-" + index).value;
      if (titre === "") {
        afficherToast("Donne au moins un titre à ton idée !", 'attention');
        return;
      }
      // On garde les autres champs de la note (notamment ses images) :
      // on ne remplace QUE le titre et le contenu.
      mesNotes[index].titre = titre;
      mesNotes[index].contenu = contenu;
      sauvegarderNotesEnStockage();
      indexEnEdition = null;
      afficherLesNotes();
    }

    function supprimerNote(index, event) {
      event.stopPropagation();  // Empêcher le click de remonter à la note
      if (confirm("Supprimer cette note ?")) {
        memoriserAvantSuppression();          // pour pouvoir annuler
        supprimerNotesParIndices([index]);    // réindexe positions, liens, état réduit
        if (indexEnEdition === index) { indexEnEdition = null; }
        sauvegarderNotesEnStockage();
        afficherLesNotes();
      }
    }

    function demarrerDeplacement(event) {
      // En mode "Relier" ou "Supprimer liens", on ne déplace pas les notes
      if (modeRelier || modeSupprimerLiens) {
        return;
      }
      if (event.target.closest('input') || event.target.closest('textarea') || event.target.closest('button')) {
        return;
      }
      if (event.type === 'mousedown' && event.button !== 0) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      indexEnCoursDeDeplacement = parseInt(event.target.closest('.note').getAttribute('data-index'));
      noteEnDeplacement = event.target.closest('.note');
      noteEnDeplacement.classList.add('dragging');
      // (La ligne noire de limite n'est plus affichée pendant le déplacement.)
      let rect = noteEnDeplacement.getBoundingClientRect();
      let clientX = event.touches ? event.touches[0].clientX : event.clientX;
      let clientY = event.touches ? event.touches[0].clientY : event.clientY;
      dragStartX = clientX - rect.left;
      dragStartY = clientY - rect.top;
      dragMoved = false;
      // Déplacement GROUPÉ : si on attrape une note déjà sélectionnée, on prépare
      // le déplacement simultané de TOUTES les notes sélectionnées.
      deplacementGroupe = false;
      if (modeSelection && notesSelectionnees.length > 0 &&
          notesSelectionnees.indexOf(indexEnCoursDeDeplacement) !== -1) {
        deplacementGroupe = true;
        groupeSourisX = clientX;
        groupeSourisY = clientY;
        let zoneG = document.getElementById('listeDesNotes');
        groupeDepart = notesSelectionnees.map(function(i) {
          let el = zoneG ? zoneG.querySelector('.note[data-index="' + i + '"]') : null;
          return el ? { index: i, el: el, x: parseFloat(el.style.left) || 0, y: parseFloat(el.style.top) || 0 } : null;
        }).filter(Boolean);
      }
      document.body.style.userSelect = 'none';
      document.body.style.webkitUserSelect = 'none';
      document.body.style.msUserSelect = 'none';
      document.body.addEventListener('selectstart', preventSelect);
    }

    function preventSelect(event) {
      event.preventDefault();
    }

    function deplacerNoteVers(event) {
      if (!noteEnDeplacement) return;
      let clientX = event.touches ? event.touches[0].clientX : event.clientX;
      let clientY = event.touches ? event.touches[0].clientY : event.clientY;
      event.preventDefault();
      dragMoved = true;
      // Met en évidence la corbeille quand on passe la note au-dessus.
      if (corbeilleEstVisible()) {
        let corb = document.getElementById('corbeille');
        if (pointeurSurCorbeille(clientX, clientY)) corb.classList.add('corbeille-survol');
        else corb.classList.remove('corbeille-survol');
      }
      let zone = document.getElementById('listeDesNotes');
      let zoneRect = zone.getBoundingClientRect();
      // Déplacement GROUPÉ : on décale toutes les notes du groupe du même delta.
      if (deplacementGroupe) {
        let dx = (clientX - groupeSourisX) / zoomNotes;
        let dy = (clientY - groupeSourisY) / zoomNotes;
        groupeDepart.forEach(function(g) {
          let nx = Math.max(0, Math.min(g.x + dx, zoneRect.width / zoomNotes - g.el.offsetWidth));
          let ny = Math.max(0, Math.min(g.y + dy, zoneRect.height / zoomNotes - g.el.offsetHeight));
          g.el.style.left = nx + 'px';
          g.el.style.top = ny + 'px';
        });
        dessinerLiens();
        return;
      }
      // On divise par le zoom : un déplacement à l'écran correspond à un
      // déplacement plus grand dans l'espace interne quand on est dézoomé.
      let newX = (clientX - dragStartX - zoneRect.left) / zoomNotes;
      let newY = (clientY - dragStartY - zoneRect.top) / zoomNotes;
      newX = Math.max(0, Math.min(newX, zoneRect.width / zoomNotes - noteEnDeplacement.offsetWidth));
      newY = Math.max(0, Math.min(newY, zoneRect.height / zoomNotes - noteEnDeplacement.offsetHeight));
      noteEnDeplacement.style.left = newX + 'px';
      noteEnDeplacement.style.top = newY + 'px';
      // Les traits reliés suivent la note en temps réel
      dessinerLiens();
    }

    function terminerDeplacement(event) {
      if (!noteEnDeplacement) return;

      // Point où on a relâché (souris ou doigt).
      let lacherX, lacherY;
      if (event && event.changedTouches && event.changedTouches[0]) {
        lacherX = event.changedTouches[0].clientX;
        lacherY = event.changedTouches[0].clientY;
      } else if (event) {
        lacherX = event.clientX;
        lacherY = event.clientY;
      }

      // Lâché AU-DESSUS de la corbeille → on DEMANDE confirmation avant de supprimer.
      if (corbeilleEstVisible() && lacherX !== undefined && pointeurSurCorbeille(lacherX, lacherY)) {
        let aSupprimer = deplacementGroupe
          ? notesSelectionnees.slice()
          : [parseInt(noteEnDeplacement.getAttribute('data-index'))];
        let nb = aSupprimer.length;
        let confirme = confirm(nb > 1
          ? ('Supprimer ces ' + nb + ' notes ?')
          : 'Supprimer cette note ?');
        // Fin du déplacement : on réinitialise l'état dans TOUS les cas.
        noteEnDeplacement.classList.remove('dragging');
        noteEnDeplacement = null;
        indexEnCoursDeDeplacement = null;
        dragMoved = false;
        deplacementGroupe = false;
        groupeDepart = [];
        document.body.style.userSelect = '';
        document.body.style.webkitUserSelect = '';
        document.body.style.msUserSelect = '';
        document.body.removeEventListener('selectstart', preventSelect);
        let corb = document.getElementById('corbeille');
        if (corb) corb.classList.remove('corbeille-survol');
        if (confirme) {
          memoriserAvantSuppression();   // pour pouvoir annuler
          supprimerNotesParIndices(aSupprimer);
          notesSelectionnees = [];
          indexEnEdition = null;
          sauvegarderNotesEnStockage();
        }
        // Si annulé : on ne supprime rien et les notes reviennent à leur place.
        afficherLesNotes();
        return;
      }

      noteEnDeplacement.classList.remove('dragging');
      // Masquer la ligne limite à la fin du déplacement (avec animation)
      var ligneFin = document.getElementById('zoneLimite');
      if (ligneFin) {
        ligneFin.style.opacity = '0';
        setTimeout(function() {
          ligneFin.style.display = 'none';
          ligneFin.style.width = '0';
          // remettre la ligne à l'intérieur de la zone si le DOM a été modifié
          var container = document.getElementById('listeDesNotes');
          if (container && ligneFin.parentElement !== container) {
            container.appendChild(ligneFin);
            ligneFin.style.top = '0px';
            ligneFin.style.left = '0px';
          }
        }, 220);
      }
      // Déplacement GROUPÉ : on enregistre la nouvelle position de chaque note
      // du groupe (en gardant leur profondeur z existante).
      if (deplacementGroupe) {
        groupeDepart.forEach(function(g) {
          let gx = parseInt(g.el.style.left || 0);
          let gy = parseInt(g.el.style.top || 0);
          positionsNotes[g.index] = Object.assign({}, positionsNotes[g.index], { x: gx, y: gy });
        });
        sauvegarderNotesEnStockage();
      }
      let index = parseInt(noteEnDeplacement.getAttribute('data-index'));
      let newX = parseInt(noteEnDeplacement.style.left || 0);
      let newY = parseInt(noteEnDeplacement.style.top || 0);
      positionsNotes[index] = Object.assign({}, positionsNotes[index], { x: newX, y: newY });
      amenerNoteAuPremierPlan(index);  // la note déposée reste devant les autres
      noteEnDeplacement.style.zIndex = positionsNotes[index].z;  // effet immédiat, sans re-affichage
      sauvegarderNotesEnStockage();
      if (dragMoved) {
        noteEnDeplacement.addEventListener('click', function(stopEvent) {
          stopEvent.stopImmediatePropagation();
        }, { once: true, capture: true });
      }
      noteEnDeplacement = null;
      indexEnCoursDeDeplacement = null;
      dragMoved = false;
      deplacementGroupe = false;
      groupeDepart = [];
      document.body.style.userSelect = '';
      document.body.style.webkitUserSelect = '';
      document.body.style.msUserSelect = '';
      document.body.removeEventListener('selectstart', preventSelect);
    }

    window.addEventListener('mousemove', deplacerNoteVers);
    window.addEventListener('touchmove', deplacerNoteVers, { passive: false });
    window.addEventListener('mouseup', terminerDeplacement);
    window.addEventListener('touchend', terminerDeplacement);
    window.addEventListener('touchcancel', terminerDeplacement);

    // ----- SE DÉPLACER DANS LA PAGE (PAN) -----
    // On maintient le clic gauche sur le FOND et on bouge la souris.
    // Le déplacement des NOTES est prioritaire : quand on clique une note,
    // sa fonction "demarrerDeplacement" appelle stopPropagation(), donc ce
    // mousedown-ci ne se déclenche pas et le fond ne bouge pas.
    let enPan = false;          // true pendant un déplacement du fond
    let panSourisX = 0, panSourisY = 0;  // position de la souris au départ
    let panDepartX = 0, panDepartY = 0;  // valeurs de panX/panY au départ

    function demarrerPan(event) {
      // On AUTORISE le déplacement du fond dans TOUS les modes (y compris
      // "Relier" et "Supprimer liens") : le pan ne démarre que sur le fond vide
      // (les clics sur les notes/boutons/champs sont exclus juste après), donc
      // il n'interfère pas avec la sélection des notes ou des liens.
      // En mode "Sélection", le clic-glissé sur le fond trace un rectangle de
      // sélection (voir demarrerSelectionRect) au lieu de déplacer la vue.
      if (modeSelection) return;
      // Pas de pan si on clique sur une note, un bouton ou un champ
      if (event.target.closest('.note') || event.target.closest('button') ||
          event.target.closest('input') || event.target.closest('textarea')) return;
      if (event.type === 'mousedown' && event.button !== 0) return; // clic gauche seulement
      let p = event.touches ? event.touches[0] : event;
      enPan = true;
      panSourisX = p.clientX; panSourisY = p.clientY;
      panDepartX = panX; panDepartY = panY;
      document.body.style.cursor = 'grabbing';
      // Empêcher la sélection (surlignage) du texte pendant le déplacement
      document.body.style.userSelect = 'none';
      document.body.style.webkitUserSelect = 'none';
      document.body.style.msUserSelect = 'none';
      document.body.addEventListener('selectstart', preventSelect);
    }

    function deplacerPan(event) {
      if (!enPan) return;
      let p = event.touches ? event.touches[0] : event;
      panX = panDepartX + (p.clientX - panSourisX);
      panY = panDepartY + (p.clientY - panSourisY);
      appliquerTransform();   // mise à jour rapide (les traits suivent tout seuls)
      event.preventDefault();
    }

    function terminerPan() {
      if (!enPan) return;
      enPan = false;
      document.body.style.cursor = '';
      // On réautorise la sélection du texte
      document.body.style.userSelect = '';
      document.body.style.webkitUserSelect = '';
      document.body.style.msUserSelect = '';
      document.body.removeEventListener('selectstart', preventSelect);
      // On mémorise la nouvelle position
      try { ecrireJSON(CLE_PAN, { x: panX, y: panY }); } catch (e) {}
    }

    // ----- TRACÉ DU RECTANGLE DE SÉLECTION (mode "Sélection") -----
    function demarrerSelectionRect(event) {
      if (!modeSelection) return;
      // Seulement sur le fond vide (pas sur une note, un bouton, un champ)
      if (event.target.closest('.note') || event.target.closest('button') ||
          event.target.closest('input') || event.target.closest('textarea')) return;
      if (event.type === 'mousedown' && event.button !== 0) return;
      let p = event.touches ? event.touches[0] : event;
      tracageRect = true;
      rectABouge = false;
      rectDepartX = p.clientX;
      rectDepartY = p.clientY;
      let r = document.getElementById('rectSelection');
      if (r) {
        r.style.left = rectDepartX + 'px';
        r.style.top = rectDepartY + 'px';
        r.style.width = '0px';
        r.style.height = '0px';
        r.style.display = 'block';
      }
      // Empêche le texte des boutons/libellés de se surligner pendant le tracé.
      document.body.style.userSelect = 'none';
      document.body.style.webkitUserSelect = 'none';
      document.body.style.msUserSelect = 'none';
      document.body.addEventListener('selectstart', preventSelect);
      event.preventDefault();
    }

    function deplacerSelectionRect(event) {
      if (!tracageRect) return;
      let p = event.touches ? event.touches[0] : event;
      let x = p.clientX, y = p.clientY;
      if (Math.abs(x - rectDepartX) > 3 || Math.abs(y - rectDepartY) > 3) rectABouge = true;
      let left = Math.min(x, rectDepartX), top = Math.min(y, rectDepartY);
      let r = document.getElementById('rectSelection');
      if (r) {
        r.style.left = left + 'px';
        r.style.top = top + 'px';
        r.style.width = Math.abs(x - rectDepartX) + 'px';
        r.style.height = Math.abs(y - rectDepartY) + 'px';
      }
      event.preventDefault();
    }

    function terminerSelectionRect() {
      if (!tracageRect) return;
      tracageRect = false;
      // On réautorise la sélection de texte (mise en place dans demarrerSelectionRect).
      document.body.style.userSelect = '';
      document.body.style.webkitUserSelect = '';
      document.body.style.msUserSelect = '';
      document.body.removeEventListener('selectstart', preventSelect);
      let r = document.getElementById('rectSelection');
      let boite = r ? r.getBoundingClientRect() : null;
      if (r) r.style.display = 'none';
      // Simple clic dans le vide (pas de tracé) → on vide la sélection
      if (!rectABouge || !boite) {
        viderSelection();
        return;
      }
      // On sélectionne toutes les notes qui chevauchent le rectangle
      let nouvelles = [];
      document.querySelectorAll('#listeDesNotes .note').forEach(function(el) {
        let b = el.getBoundingClientRect();
        let chevauche = !(b.right < boite.left || b.left > boite.right ||
                          b.bottom < boite.top || b.top > boite.bottom);
        if (chevauche) {
          let idx = parseInt(el.getAttribute('data-index'));
          if (!isNaN(idx)) nouvelles.push(idx);
        }
      });
      notesSelectionnees = nouvelles;
      majSurbrillanceSelection();
    }

    let zonePourPan = document.getElementById('zoneDeplacement');
    if (zonePourPan) {
      zonePourPan.addEventListener('mousedown', demarrerPan);
      zonePourPan.addEventListener('touchstart', demarrerPan, { passive: false });
      // Le tracé du rectangle de sélection écoute aussi le fond
      zonePourPan.addEventListener('mousedown', demarrerSelectionRect);
      zonePourPan.addEventListener('touchstart', demarrerSelectionRect, { passive: false });

      // ----- ZOOM AU PAVÉ TACTILE (pincement à deux doigts) -----
      // Le navigateur traduit le pincement en "molette + Ctrl". On capte ça
      // pour zoomer/dézoomer autour de l'endroit où sont les doigts.
      zonePourPan.addEventListener('wheel', function(event) {
        if (!event.ctrlKey) return;   // seulement le pincement (ou Ctrl + molette)
        event.preventDefault();        // empêche le zoom de la page entière
        let rect = zonePourPan.getBoundingClientRect();
        let ancreX = event.clientX - rect.left;  // position des doigts dans la zone
        let ancreY = event.clientY - rect.top;
        // deltaY < 0 = doigts qui s'écartent = zoomer ; > 0 = dézoomer.
        // Le facteur exponentiel rend le zoom progressif et fluide.
        let facteur = Math.exp(-event.deltaY * 0.01);
        fixerZoomAutourDe(zoomNotes * facteur, ancreX, ancreY);
      }, { passive: false });
    }
    window.addEventListener('mousemove', deplacerPan);
    window.addEventListener('touchmove', deplacerPan, { passive: false });
    window.addEventListener('mouseup', terminerPan);
    window.addEventListener('touchend', terminerPan);
    window.addEventListener('touchcancel', terminerPan);
    // Tracé du rectangle de sélection
    window.addEventListener('mousemove', deplacerSelectionRect);
    window.addEventListener('touchmove', deplacerSelectionRect, { passive: false });
    window.addEventListener('mouseup', terminerSelectionRect);
    window.addEventListener('touchend', terminerSelectionRect);
    window.addEventListener('touchcancel', terminerSelectionRect);
    // Si la fenêtre change de taille, on re-cale le canevas proprement
    window.addEventListener('resize', appliquerZoom);

    // ----- ZOOM AU CLAVIER -----
    // Touche "-" (ou "-" du pavé numérique) = dézoomer, "+" = rezoomer.
    window.addEventListener('keydown', function(event) {
      // On ne fait rien si on est en train d'écrire dans un champ ou le titre.
      let actif = document.activeElement;
      if (actif && (actif.tagName === 'INPUT' || actif.tagName === 'TEXTAREA' || actif.isContentEditable)) return;
      // On ignore les raccourcis système (Ctrl/Cmd + touche)
      if (event.ctrlKey || event.metaKey || event.altKey) return;

      if (event.key === '-' || event.key === 'Subtract' || event.code === 'NumpadSubtract') {
        changerZoom(-0.1);   // dézoomer
        event.preventDefault();
      } else if (event.key === '+' || event.key === '=' || event.key === 'Add' || event.code === 'NumpadAdd') {
        changerZoom(0.1);    // rezoomer
        event.preventDefault();
      } else if (event.key === 'Delete' || event.key === 'Backspace') {
        // Suppr : supprime les notes sélectionnées (avec confirmation).
        if (notesSelectionnees.length > 0) {
          event.preventDefault();
          let nb = notesSelectionnees.length;
          if (confirm(nb > 1 ? ('Supprimer ces ' + nb + ' notes ?') : 'Supprimer cette note ?')) {
            memoriserAvantSuppression();
            supprimerNotesParIndices(notesSelectionnees.slice());
            notesSelectionnees = [];
            indexEnEdition = null;
            sauvegarderNotesEnStockage();
            afficherLesNotes();
          }
        }
      } else if (event.key === 'Escape') {
        // Échap : on sort du mode en cours ou on vide la sélection.
        if (modeRelier) basculerModeRelier();
        else if (modeSupprimerLiens) { quitterModeSupprimerLiens(); dessinerLiens(); }
        else if (modeSelection) basculerModeSelection();
        else if (notesSelectionnees.length > 0) viderSelection();
      }
    });

    // Ctrl+Z (ou Cmd+Z) → annuler la dernière suppression de notes.
    // Exception : si on écrit dans un champ ou dans le titre éditable, on laisse
    // le navigateur faire SON annulation de texte habituelle.
    window.addEventListener('keydown', function(event) {
      if ((event.ctrlKey || event.metaKey) && !event.shiftKey &&
          (event.key === 'z' || event.key === 'Z')) {
        let actif = document.activeElement;
        if (actif && (actif.tagName === 'INPUT' || actif.tagName === 'TEXTAREA' || actif.isContentEditable)) return;
        if (historiqueSuppressions.length > 0) {
          annulerSuppression();
          event.preventDefault();
        }
      }
    });

    // En mode "Supprimer liens", un clic AILLEURS que sur un trait ou le bouton
    // annule tout (désélectionne) et désactive le mode.
    // (Les clics sur un trait ou sur le bouton appellent stopPropagation et
    //  n'arrivent donc pas ici.)
    document.addEventListener('click', function(event) {
      if (!modeSupprimerLiens) return;
      if (event.target.closest('#boutonSupprimerLiens')) return;
      quitterModeSupprimerLiens();
      dessinerLiens();
    });

    // Un clic en dehors de la palette de couleurs la referme.
    document.addEventListener('click', function(event) {
      let pal = document.getElementById('paletteCouleurs');
      if (!pal || pal.style.display === 'none') return;
      if (event.target.closest('#paletteCouleurs')) return;  // clic DANS la palette
      fermerPalette();
    });

    // ----- SE SOUVENIR DU FICHIER ENTRE DEUX OUVERTURES -----
    // IndexedDB est un petit espace de stockage du navigateur. Contrairement
    // à une simple variable (qui s'oublie quand on ferme la page), il peut
    // retenir le "raccourci" vers le fichier choisi, même après fermeture.
    const IDB_NOM = "mon-deuxieme-cerveau";   // nom de la base
    const IDB_STORE = "fichiers";             // nom du tiroir
    const IDB_CLE = "fichier-notes";          // étiquette de l'objet rangé

    // Ouvre (ou crée) la base de données.
    function ouvrirBaseFichier() {
      return new Promise(function(resolve, reject) {
        let demande = indexedDB.open(IDB_NOM, 1);
        demande.onupgradeneeded = function() {
          demande.result.createObjectStore(IDB_STORE);
        };
        demande.onsuccess = function() { resolve(demande.result); };
        demande.onerror = function() { reject(demande.error); };
      });
    }

    // Range le "raccourci" du fichier dans IndexedDB, sous une clé PROPRE à
    // l'onglet actif : ainsi chaque onglet enregistre dans son propre fichier.
    async function memoriserFichier(handle) {
      try {
        let base = await ouvrirBaseFichier();
        base.transaction(IDB_STORE, "readwrite")
            .objectStore(IDB_STORE).put(handle, cleFichierOnglet(IDB_CLE, SUFFIXE_PARTAGE, SUFFIXE_ONGLET));
      } catch (e) { console.warn("Impossible de mémoriser le fichier :", e); }
    }

    // Récupère le "raccourci" du fichier de l'onglet actif (ou null).
    async function recupererFichierMemorise() {
      try {
        let base = await ouvrirBaseFichier();
        return await new Promise(function(resolve) {
          let req = base.transaction(IDB_STORE, "readonly")
                        .objectStore(IDB_STORE).get(cleFichierOnglet(IDB_CLE, SUFFIXE_PARTAGE, SUFFIXE_ONGLET));
          req.onsuccess = function() { resolve(req.result || null); };
          req.onerror = function() { resolve(null); };
        });
      } catch (e) { return null; }
    }

    // Vérifie qu'on a le droit d'écrire dans le fichier.
    // Si "demander" est vrai, on peut afficher la petite demande de permission.
    async function verifierPermissionFichier(handle, demander) {
      if (!handle.queryPermission) return true; // vieux navigateur : on tente
      let opts = { mode: "readwrite" };
      if ((await handle.queryPermission(opts)) === "granted") return true;
      if (demander && (await handle.requestPermission(opts)) === "granted") return true;
      return false;
    }

    // ----- PARTAGER : afficher le lien de l'application à copier -----
    // Le bouton ouvre une petite fenêtre montrant l'adresse du site, avec un
    // bouton pour la copier et l'envoyer à n'importe qui.
    const LIEN_PARTAGE = 'https://martinleyssene.github.io/mes-notes/';

    function partagerNotes() {
      let modal = document.getElementById('modalPartage');
      let champ = document.getElementById('lienPartage');
      let msg = document.getElementById('lienCopieMsg');
      if (msg) msg.style.display = 'none';
      if (champ) champ.value = LIEN_PARTAGE;
      if (modal) modal.style.display = 'flex';
      // On présélectionne le lien pour pouvoir le copier tout de suite (Ctrl/Cmd+C)
      if (champ) { champ.focus(); champ.select(); }
    }

    // Copie le lien dans le presse-papiers.
    function copierLienPartage() {
      let champ = document.getElementById('lienPartage');
      let msg = document.getElementById('lienCopieMsg');
      let montrerOk = function() { if (msg) msg.style.display = 'block'; };
      // Méthode moderne (navigateurs récents, contexte sécurisé)
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(LIEN_PARTAGE).then(montrerOk).catch(function() {
          // Repli : on sélectionne le champ et on copie à l'ancienne
          if (champ) { champ.focus(); champ.select(); }
          try { document.execCommand('copy'); montrerOk(); } catch (e) {}
        });
      } else if (champ) {
        champ.focus(); champ.select();
        try { document.execCommand('copy'); montrerOk(); } catch (e) {}
      }
    }

    // Ferme la fenêtre de partage.
    function fermerModalPartage() {
      let modal = document.getElementById('modalPartage');
      if (modal) modal.style.display = 'none';
    }

    // ----- TÉLÉCHARGER LES NOTES DANS UN FICHIER -----
    // On garde en mémoire LE fichier choisi pour réécrire par-dessus
    // à chaque téléchargement (au lieu de créer mes-notes (1).json, (2)...).
    let fichierNotesEnregistre = null;

    // "estAuto" = true quand c'est la sauvegarde automatique (toutes les 10 min).
    // Dans ce cas on ne dérange JAMAIS l'utilisateur avec une fenêtre.
    async function telechargerNotes(estAuto) {
      // En sauvegarde automatique (silencieuse), on n'affiche pas l'indicateur
      // de chargement, pour ne pas le faire clignoter à chaque modification.
      const spinner = estAuto ? null : document.getElementById('spinner');
      if (spinner) spinner.style.display = 'inline-block';
      // Permettre au navigateur d'afficher le spinner avant de bloquer potentiellement le thread
      await new Promise(requestAnimationFrame);
      try {
        // On enregistre AUSSI les positions, les liens et l'état réduit, pour
        // que la disposition des notes soit conservée — même sur un autre appareil.
        let elTitre = document.getElementById('titrePrincipal');
        let titrePrincipal = elTitre ? elTitre.textContent.trim() : '';
        let elDescription = document.getElementById('descriptionPrincipale');
        let descriptionPrincipale = elDescription ? elDescription.textContent.trim() : '';
        let donneesExport = construireExportNotes({
          titre: titrePrincipal,
          description: descriptionPrincipale,
          notes: mesNotes,
          positions: positionsNotes,
          liens: liens,
          reduites: notesReduites
        });
        let contenuJSON = JSON.stringify(donneesExport, null, 2);

        // CAS 1 : le navigateur sait écrire directement dans un fichier
        // (Chrome, Edge...). On réutilise toujours le MÊME fichier.
        if (window.showSaveFilePicker) {
          try {
            // Si on ne connaît pas encore le fichier, on tente de le récupérer
            // depuis la dernière fois (IndexedDB).
            if (!fichierNotesEnregistre) {
              fichierNotesEnregistre = await recupererFichierMemorise();
            }

            // On a un fichier mémorisé : on vérifie la permission d'écrire.
            if (fichierNotesEnregistre) {
              let ok = await verifierPermissionFichier(fichierNotesEnregistre, !estAuto);
              if (!ok) {
                if (estAuto) return;            // auto-save : on ne dérange pas
                fichierNotesEnregistre = null;  // sinon on rechoisira un fichier
              }
            }

            // Toujours pas de fichier connu : on demande où enregistrer
            // (sauf en auto-save, où on ne montre aucune fenêtre).
            if (!fichierNotesEnregistre) {
              if (estAuto) return;
              fichierNotesEnregistre = await window.showSaveFilePicker({
                suggestedName: "mes-notes.json",
                types: [{
                  description: "Fichier de notes",
                  accept: { "application/json": [".json"] }
                }]
              });
              // On le mémorise pour les prochaines ouvertures de la page.
              await memoriserFichier(fichierNotesEnregistre);
            }

            // On écrit (ou réécrit) par-dessus le fichier déjà choisi.
            let flux = await fichierNotesEnregistre.createWritable();
            await flux.write(contenuJSON);
            await flux.close();
            return;
          } catch (e) {
            if (e && e.name === 'AbortError') return;  // l'utilisateur a fermé la fenêtre : on n'insiste pas
            // Cette API échoue notamment quand la page est ouverte en file://
            // (double-clic sur le fichier). Dans ce cas, on NE bloque pas : on
            // bascule sur le téléchargement classique juste en dessous.
            console.warn('Enregistrement direct impossible, repli sur téléchargement classique :', e);
            fichierNotesEnregistre = null;
          }
        }

        // CAS 2 : navigateur sans cette API (Firefox, Safari…) OU repli après
        // un échec du CAS 1 (ex. page ouverte en file://).
        if (estAuto) return; // pas de fenêtre intempestive en auto-save
        let blob = new Blob([contenuJSON], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let lien = document.createElement("a");
        lien.href = url;
        lien.download = "mes-notes.json";
        document.body.appendChild(lien);
        lien.click();
        document.body.removeChild(lien);
        URL.revokeObjectURL(url);
      } catch (e) {
        // Si l'utilisateur ferme la fenêtre de choix, ce n'est pas une vraie erreur.
        if (e && e.name === 'AbortError') return;
        console.error('Erreur durant le téléchargement :', e);
      } finally {
        if (spinner) spinner.style.display = 'none';
      }
    }

    // "Télécharger sous…" : choisir un NOUVEL emplacement pour le fichier de
    // notes. Désormais, les enregistrements (manuels ET automatiques) iront là.
    async function telechargerNotesSous() {
      // La fenêtre "Enregistrer sous" n'existe qu'en ligne avec Chrome/Edge.
      // En local (file://) ou sur Safari/Firefox, on prévient et on retombe sur
      // un téléchargement classique (vers le dossier de téléchargements).
      if (!window.showSaveFilePicker || location.protocol === 'file:') {
        afficherToast("ⓘ Choisir l'emplacement n'est possible que sur la version EN LIGNE avec Chrome ou Edge. Ici, le fichier part dans ton dossier de téléchargements habituel.", 'attention', 8000);
        telechargerNotes(false);
        return;
      }
      // IMPORTANT : on ouvre la fenêtre TOUT DE SUITE, dans le clic de
      // l'utilisateur, AVANT le moindre "await" qui ferait expirer l'action
      // utilisateur (sinon le navigateur refuse d'afficher le sélecteur).
      let nouvelEmplacement;
      try {
        nouvelEmplacement = await window.showSaveFilePicker({
          suggestedName: "mes-notes.json",
          types: [{
            description: "Fichier de notes",
            accept: { "application/json": [".json"] }
          }]
        });
      } catch (e) {
        if (e && e.name === 'AbortError') return;   // l'utilisateur a annulé : normal
        afficherToast("❌ Impossible d'ouvrir la fenêtre d'enregistrement : " + e.message, 'erreur');
        return;
      }
      // On retient ce nouvel emplacement, puis on écrit dedans via la fonction
      // habituelle (qui n'a plus besoin d'ouvrir de fenêtre : le fichier est connu).
      fichierNotesEnregistre = nouvelEmplacement;
      try { await memoriserFichier(nouvelEmplacement); } catch (e) {}
      telechargerNotes(false);
      afficherToast("✅ Nouvel emplacement choisi. Tes notes seront désormais enregistrées ici.", 'succes');
    }

    // Le contrôle manuel est désormais un bouton "Télécharger" unique

    // ----- CHARGER LES NOTES DEPUIS UN FICHIER -----
    async function chargerNotes() {
      // Si le navigateur le permet (Chrome, Edge...), on ouvre le fichier
      // ET on le retient : les futurs téléchargements écriront dans CE fichier.
      if (window.showOpenFilePicker) {
        try {
          let [handle] = await window.showOpenFilePicker({
            types: [{
              description: "Fichier de notes",
              accept: { "application/json": [".json"] }
            }]
          });
          let fichier = await handle.getFile();
          let texte = await fichier.text();
          appliquerNotesImportees(texte);
          // On retient ce fichier comme fichier de notes courant.
          fichierNotesEnregistre = handle;
          await memoriserFichier(handle);
        } catch (e) {
          if (e && e.name === 'AbortError') return; // l'utilisateur a annulé
          console.error('Erreur en ouvrant le fichier :', e);
        }
        return;
      }
      // Sinon, méthode classique avec le champ fichier caché.
      document.getElementById("fichierNotes").click();
    }

    // Petite fonction commune qui range les notes importées (texte JSON).
    function appliquerNotesImportees(texte) {
      try {
        let data = JSON.parse(texte);
        let ancienFormat = false;
        if (Array.isArray(data)) {
          // Ancien format : une simple liste de notes (sans positions).
          // On repart d'une disposition propre (les notes seront recentrées).
          mesNotes = data;
          positionsNotes = {};
          liens = [];
          notesReduites = {};
          ancienFormat = true;
        } else if (data && Array.isArray(data.notes)) {
          // Nouveau format : on restaure aussi la disposition (positions, liens…).
          mesNotes = data.notes;
          positionsNotes = data.positions || {};
          liens = Array.isArray(data.liens) ? data.liens : [];
          notesReduites = data.reduites || {};
          // …et le titre principal, s'il est présent dans le fichier.
          if (typeof data.titre === 'string' && data.titre.trim() !== '') {
            let h = document.getElementById('titrePrincipal');
            if (h) h.textContent = data.titre.trim();
            localStorage.setItem(CLE_TITRE, data.titre.trim());
          }
          // …et la description, si elle est présente dans le fichier.
          if (typeof data.description === 'string') {
            let pd = document.getElementById('descriptionPrincipale');
            if (pd) pd.textContent = data.description.trim();
            localStorage.setItem(CLE_DESCRIPTION, data.description.trim());
          }
        } else {
          afficherToast("❌ Le fichier n'est pas au bon format.", 'erreur');
          return;
        }
        sauvegarderNotesEnStockage();
        // Ne recentre QUE si le fichier n'avait pas de positions enregistrées.
        recentrerNotesAuCentre(false);
        afficherLesNotes();
        if (ancienFormat) {
          afficherToast("✅ " + mesNotes.length + " note(s) chargée(s).\n\n⚠️ Ce fichier est à l'ancien format : il ne contenait NI les positions NI les liens (les notes ont donc été replacées automatiquement).\nPour conserver la disposition, re-télécharge tes notes depuis la version à jour, puis recharge CE nouveau fichier.", 'attention', 8000);
        } else {
          afficherToast("✅ Notes chargées ! (" + mesNotes.length + " note(s), positions et liens restaurés)", 'succes');
        }
      } catch (erreur) {
        afficherToast("❌ Erreur en lisant le fichier : " + erreur.message, 'erreur');
      }
    }

    document.getElementById("fichierNotes").addEventListener("change", function(event) {
      let fichier = event.target.files[0];
      if (!fichier) return;

      let lecteur = new FileReader();
      lecteur.onload = function(e) {
        appliquerNotesImportees(e.target.result);
      };
      lecteur.readAsText(fichier);
    });
